name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_SMOKE_06A950800 }}
          action: "upload"

          # 🔥 SESUAIKAN INI
          app_location: "/"        # kalau index.html di root
          api_location: ""
          output_location: "/"

          # 🔥 WAJIB untuk HTML static
          skip_app_build: true
