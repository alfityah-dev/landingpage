name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_DESERT_07C116800 }}
          action: "upload"

          # Lokasi source code (karena HTML di root)
          app_location: "/"

          # Tidak ada API
          api_location: ""

          # Output sama dengan source (tidak ada build)
          output_location: "/"

          # 🔥 Penting: skip proses build (biar tidak pakai Oryx)
          skip_app_build: true
